apiVersion: apps/v1
kind: Deployment
metadata:
  name: control-tower
spec:
  replicas: 1
  selector:
    matchLabels:
      app: control-tower
  template:
    metadata:
      labels:
        app: control-tower
    spec:
      containers:
      - name: control-tower
        image: borderflow-control-tower:latest
        imagePullPolicy: Never
        env:
        - name: DATABASE_URL
          value: postgresql://borderflow:borderflow@postgres:5432/borderflow
        ports:
        - containerPort: 8000
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 10
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: control-tower
spec:
  selector:
    app: control-tower
  ports:
  - port: 8000
    targetPort: 8000
    nodePort: 30000
  type: NodePort
